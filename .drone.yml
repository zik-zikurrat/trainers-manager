kind: pipeline
type: docker
name: deploy

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: 37.27.33.141
      username: deploy
      port: 22
      key:
        from_secret: ssh_key
      script:
        - cd ~/trainers-manager
        - git pull origin main
        - docker compose up -d --build training

trigger:
  branch:
    - main
  event:
    - push